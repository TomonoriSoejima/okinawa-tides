name: Weekly tide scrape + deploy

on:
  schedule:
    - cron: '0 1 * * 1'   # Every Monday 01:00 UTC (10:00 JST)
  workflow_dispatch:        # Manual trigger

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_tides.py

      - name: Commit updated tides.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tides.json
          git diff --cached --quiet || git commit -m "chore: auto-update tides data [skip ci]"
          git push

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -a okinawa-tides
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
