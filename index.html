<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naha Tide Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #08121f;
      color: #ddeeff;
      min-height: 100vh;
      padding: 1rem 0.75rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #7ec8e3;
    }
    header p {
      font-size: 0.8rem;
      color: #7a9ab8;
      margin-top: 0.25rem;
    }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 0.75rem; }

    .card {
      background: #0e1f35;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #1a3050;
    }
    .card.today {
      border-color: #3a90d0;
      box-shadow: 0 0 0 2px #1a5a9055;
    }

    /* card header row */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem 0.5rem;
      background: #122840;
      border-bottom: 1px solid #1a3050;
    }
    .card-date {
      font-size: 1rem;
      font-weight: 700;
      color: #ddeeff;
    }
    .card.today .card-date { color: #7ec8e3; }
    .today-badge {
      font-size: 0.68rem;
      background: #1a5a90;
      color: #aadcf8;
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .moon-phase {
      font-size: 0.75rem;
      background: #1c3555;
      color: #b8d4f0;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
    }

    /* sun / moon meta row */
    .card-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #1a3050;
    }
    .meta-box {
      padding: 0.45rem 0.3rem;
      text-align: center;
      border-right: 1px solid #1a3050;
    }
    .meta-box:last-child { border-right: none; }
    .meta-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .meta-box.sun  .meta-label { color: #e8c96a; }
    .meta-box.moon .meta-label { color: #b0c8f0; }
    .meta-value {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .meta-box.sun  .meta-value { color: #f0d97a; }
    .meta-box.moon .meta-value { color: #c8deff; }

    /* tides row */
    .card-tides {
      display: flex;
      flex-wrap: wrap;
      padding: 0.5rem 0.5rem;
      gap: 0.4rem;
    }
    .tide-chip {
      flex: 1 1 0;
      min-width: 60px;
      text-align: center;
      background: #0a1828;
      border-radius: 10px;
      padding: 0.45rem 0.3rem;
      border: 1px solid #1a3050;
    }
    .tide-chip.high { border-color: #2a6a8a; }
    .tide-chip.low  { border-color: #8a4a20; }
    .tide-type {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .tide-chip.high .tide-type { color: #7ec8e3; }
    .tide-chip.low  .tide-type { color: #f4a261; }
    .tide-time {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ddeeff;
    }
    .tide-height {
      font-size: 0.72rem;
      margin-top: 0.2rem;
    }
    .tide-chip.high .tide-height { color: #5ab0d0; }
    .tide-chip.low  .tide-height { color: #d4804a; }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #3a5a78;
    }
    footer a { color: #5a98c0; text-decoration: none; }

    /* sparkline */
    .card-sparkline {
      padding: 0.4rem 0.6rem 0.6rem;
      border-top: 1px solid #1a3050;
    }
    .card-sparkline svg { display: block; width: 100%; height: 44px; }

    /* wider screens: 2-column card grid */
    @media (min-width: 640px) {
      .cards { flex-direction: row; flex-wrap: wrap; }
      .card  { flex: 1 1 calc(50% - 0.375rem); }
    }
    @media (min-width: 1024px) {
      .card { flex: 1 1 calc(33.33% - 0.5rem); }
    }
  </style>
</head>
<body>

<header>
  <h1>🌊 Naha, Okinawa</h1>
  <p id="subtitle">Tide Calendar · JST · Heights in metres</p>
</header>

<div class="cards" id="cards"></div>

<footer>
  Data: <a href="https://www.tidetime.org/asia/japan/naha-okinawa-japan-calendar.htm" target="_blank" rel="noopener">tidetime.org</a> · © Tide Times 2026
</footer>

<script>
const moonEmoji = { "Full Moon": "🌕", "Last Quarter": "🌗", "New Moon": "🌑", "First Quarter": "🌓" };
const today = new Date().toISOString().slice(0, 10);

function t(val) { return val || "—"; }

// ── Sparkline (cosine interpolation, courtesy Copilot) ──
function parseTimeToMinutes(timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const period = m[3].toUpperCase();
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function cosineInterp(a, b, mu) {
  return a + (b - a) * (1 - Math.cos(mu * Math.PI)) / 2;
}

function buildSparklineSVG(tides, uid) {
  const W = 400, H = 52, PAD = 4;
  if (!tides || tides.length < 2)
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"></svg>`;

  const pts = tides
    .map(t => ({ t: parseTimeToMinutes(t.time), h: t.height_m, type: t.type }))
    .filter(p => p.t !== null)
    .sort((a, b) => a.t - b.t);

  if (pts.length < 2)
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"></svg>`;

  const hs = pts.map(p => p.h);
  const hMin = Math.min(...hs), hMax = Math.max(...hs);
  const hPad = Math.max((hMax - hMin) * 0.2, 0.05);
  const lo = hMin - hPad, hi = hMax + hPad, hRng = hi - lo;

  const ext = [
    { t: pts[0].t - (pts[1].t - pts[0].t), h: pts[1].h },
    ...pts,
    { t: pts[pts.length-1].t + (pts[pts.length-1].t - pts[pts.length-2].t), h: pts[pts.length-2].h }
  ];

  const toX = t => PAD + (W - PAD*2) * (t / 1440);
  const toY = h => PAD + (H - PAD*2) * (1 - (h - lo) / hRng);

  const N = 120;
  const samples = [];
  for (let i = 0; i <= N; i++) {
    const tc = (i / N) * 1440;
    let s1 = ext[0], s2 = ext[ext.length-1];
    for (let j = 0; j < ext.length-1; j++) {
      if (ext[j].t <= tc && ext[j+1].t > tc) { s1 = ext[j]; s2 = ext[j+1]; break; }
    }
    const mu = s2.t === s1.t ? 0 : Math.max(0, Math.min(1, (tc - s1.t) / (s2.t - s1.t)));
    samples.push({ x: toX(tc), y: toY(cosineInterp(s1.h, s2.h, mu)) });
  }

  const lineD = samples.map((p,i) => `${i?'L':'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaD = `${lineD} L ${toX(1440).toFixed(1)} ${H} L ${toX(0).toFixed(1)} ${H} Z`;
  const dots = pts.map(p => {
    const color = p.type === 'H' ? '#7ec8e3' : '#f4a261';
    return `<circle cx="${toX(p.t).toFixed(1)}" cy="${toY(p.h).toFixed(1)}" r="3" fill="${color}" stroke="#08121f" stroke-width="1"/>`;
  }).join('');

  const gid = `sg${uid}`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">` +
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">` +
    `<stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.28"/>` +
    `<stop offset="100%" stop-color="#7ec8e3" stop-opacity="0.03"/>` +
    `</linearGradient></defs>` +
    `<path d="${areaD}" fill="url(#${gid})"/>` +
    `<path d="${lineD}" fill="none" stroke="#7ec8e3" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>` +
    `${dots}</svg>`;
}

function renderCards(days) {
  const container = document.getElementById("cards");
  days.forEach(day => {
    const isToday = day.date === today;
    const card = document.createElement("div");
    card.className = "card" + (isToday ? " today" : "");

    // ── header ──
    const head = document.createElement("div");
    head.className = "card-head";
    const dateEl = document.createElement("div");
    dateEl.className = "card-date";
    dateEl.innerHTML = day.label + (isToday ? ' <span class="today-badge">Today</span>' : "");
    head.appendChild(dateEl);
    if (day.moon_phase) {
      const ph = document.createElement("span");
      ph.className = "moon-phase";
      ph.textContent = (moonEmoji[day.moon_phase] || "") + " " + day.moon_phase;
      head.appendChild(ph);
    }
    card.appendChild(head);

    // ── sun / moon meta ──
    const meta = document.createElement("div");
    meta.className = "card-meta";
    const metaItems = [
      { cls: "sun",  label: "Sunrise",  value: t(day.sunrise) },
      { cls: "sun",  label: "Sunset",   value: t(day.sunset) },
      { cls: "moon", label: "Moonrise", value: t(day.moonrise) },
      { cls: "moon", label: "Moonset",  value: t(day.moonset) },
    ];
    metaItems.forEach(item => {
      const box = document.createElement("div");
      box.className = `meta-box ${item.cls}`;
      box.innerHTML = `<div class="meta-label">${item.label}</div><div class="meta-value">${item.value}</div>`;
      meta.appendChild(box);
    });
    card.appendChild(meta);

    // ── tides ──
    const tidesRow = document.createElement("div");
    tidesRow.className = "card-tides";
    day.tides.forEach(tide => {
      const chip = document.createElement("div");
      chip.className = "tide-chip " + (tide.type === "H" ? "high" : "low");
      const heightCm = Math.round(tide.height_m * 100);
      chip.innerHTML = `
        <div class="tide-type">${tide.type === "H" ? "▲ High" : "▼ Low"}</div>
        <div class="tide-time">${tide.time}</div>
        <div class="tide-height">${heightCm} cm</div>`;
      tidesRow.appendChild(chip);
    });
    card.appendChild(tidesRow);

    // ── sparkline ──
    const sparkRow = document.createElement("div");
    sparkRow.className = "card-sparkline";
    sparkRow.innerHTML = buildSparklineSVG(day.tides, day.date.replace(/-/g, ''));
    card.appendChild(sparkRow);

    container.appendChild(card);
  });
}

fetch('./data/tides.json')
  .then(r => r.json())
  .then(data => {
    const first = data.days[0].label;
    const last  = data.days[data.days.length - 1].label;
    document.getElementById("subtitle").textContent =
      `${first} – ${last} · ${data.timezone} · Heights in cm`;
    renderCards(data.days);
  })
  .catch(() => {
    document.getElementById("cards").innerHTML =
      '<p style="text-align:center;color:#f4a261;padding:2rem">Could not load data/tides.json<br>Run: <code>python3 -m http.server 8081</code></p>';
  });
</script>
</body>
</html>
