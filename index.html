<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naha Tide Calendar – April 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a1628;
      color: #e0eaf8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #7ec8e3;
      letter-spacing: 0.5px;
    }

    header p {
      color: #8aa5c0;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.82rem;
    }

    .legend span { display: flex; align-items: center; gap: 0.35rem; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }
    .dot-high { background: #7ec8e3; }
    .dot-low  { background: #f4a261; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 760px;
    }

    thead th {
      background: #112240;
      color: #7ec8e3;
      padding: 0.6rem 0.7rem;
      text-align: center;
      font-weight: 600;
      border-bottom: 2px solid #1e3a5f;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1a2d4a;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #122038; }
    tbody tr.today { background: #0d3055; }
    tbody tr.today td:first-child { font-weight: 700; color: #7ec8e3; }

    td {
      padding: 0.55rem 0.7rem;
      text-align: center;
      vertical-align: middle;
    }

    td:first-child {
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      min-width: 70px;
    }

    .high { color: #7ec8e3; }
    .low  { color: #f4a261; }
    .meta { color: #6b88a6; font-size: 0.76rem; }

    .moon-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: #1e3a5f;
      color: #c8d8f0;
      white-space: nowrap;
      margin-top: 0.2rem;
    }

    .sun-row { font-size: 0.76rem; color: #e8c96a; }
    .moon-row { font-size: 0.76rem; color: #c8d8f0; }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.76rem;
      color: #4a6280;
    }

    footer a { color: #7ec8e3; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .sparkline-cell { padding: 0.3rem 0.5rem; vertical-align: middle; }
    .sparkline-cell svg { display: block; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌊 Naha, Okinawa – Tide Calendar</h1>
  <p>April 2026 &nbsp;·&nbsp; All times JST &nbsp;·&nbsp; Heights in metres</p>
</header>

<div class="legend">
  <span><span class="dot dot-high"></span> High tide</span>
  <span><span class="dot dot-low"></span>  Low tide</span>
  <span style="color:#e8c96a">☀ Sunrise / Sunset</span>
  <span style="color:#c8d8f0">🌙 Moonrise / Moonset</span>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>Day</th>
      <th>Tide 1</th>
      <th>Tide 2</th>
      <th>Tide 3</th>
      <th>Tide 4</th>
      <th>Tide 5</th>
      <th>Moon</th>
      <th>☀ Rise / Set</th>
      <th>🌙 Rise / Set</th>
      <th>Trend</th>
    </tr>
  </thead>
  <tbody id="tbody">
  </tbody>
</table>
</div>

<footer>
  Data sourced from <a href="https://www.tidetime.org/asia/japan/naha-okinawa-japan-calendar.htm" target="_blank" rel="noopener">tidetime.org</a> &nbsp;·&nbsp; © Tide Times 2026
</footer>

<script>
const moonEmoji = { "Full Moon": "🌕", "Last Quarter": "🌗", "New Moon": "🌑", "First Quarter": "🌓" };
const today = new Date().toISOString().slice(0, 10);

// ── Sparkline helpers ────────────────────────────────────────────────────────

function parseTimeToMinutes(timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const period = m[3].toUpperCase();
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function cosineInterp(a, b, mu) {
  return a + (b - a) * (1 - Math.cos(mu * Math.PI)) / 2;
}

/**
 * Build an inline SVG sparkline for the given array of tide objects.
 * uid – a unique string used to avoid duplicate SVG gradient IDs.
 */
function buildSparklineSVG(tides, uid) {
  const W = 160, H = 44, PAD = 4;

  if (!tides || tides.length < 2) {
    return `<svg width="${W}" height="${H}" aria-hidden="true"></svg>`;
  }

  const pts = tides
    .map(t => ({ t: parseTimeToMinutes(t.time), h: t.height_m, type: t.type }))
    .filter(p => p.t !== null)
    .sort((a, b) => a.t - b.t);

  if (pts.length < 2) {
    return `<svg width="${W}" height="${H}" aria-hidden="true"></svg>`;
  }

  const hs = pts.map(p => p.h);
  const hMin = Math.min(...hs), hMax = Math.max(...hs);
  const hPad = Math.max((hMax - hMin) * 0.2, 0.05);
  const lo = hMin - hPad, hi = hMax + hPad, hRng = hi - lo;

  // Extend one segment beyond each day boundary so the curve reaches
  // t=0 and t=1440 smoothly via cosine interpolation.
  const ext = [
    { t: pts[0].t - (pts[1].t - pts[0].t), h: pts[1].h },
    ...pts,
    { t: pts[pts.length - 1].t + (pts[pts.length - 1].t - pts[pts.length - 2].t),
      h: pts[pts.length - 2].h }
  ];

  const toX = t  => PAD + (W - PAD * 2) * (t / 1440);
  const toY = h  => PAD + (H - PAD * 2) * (1 - (h - lo) / hRng);

  // Sample the cosine-interpolated curve at 120 evenly-spaced time steps.
  const N = 120;
  const samples = [];
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * 1440;
    let s1 = ext[0], s2 = ext[ext.length - 1];
    for (let j = 0; j < ext.length - 1; j++) {
      if (ext[j].t <= t && ext[j + 1].t > t) { s1 = ext[j]; s2 = ext[j + 1]; break; }
    }
    const mu = Math.max(0, Math.min(1, (t - s1.t) / (s2.t - s1.t)));
    samples.push({ x: toX(t), y: toY(cosineInterp(s1.h, s2.h, mu)) });
  }

  const lineD = samples.map((p, i) =>
    `${i ? 'L' : 'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaD =
    `${lineD} L ${toX(1440).toFixed(1)} ${H} L ${toX(0).toFixed(1)} ${H} Z`;

  const dots = pts.map(p => {
    const color = p.type === 'H' ? '#7ec8e3' : '#f4a261';
    return `<circle cx="${toX(p.t).toFixed(1)}" cy="${toY(p.h).toFixed(1)}" r="2.5" fill="${color}" stroke="#0a1628" stroke-width="0.5"/>`;
  }).join('');

  const gid = `sg${uid}`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true">` +
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">` +
    `<stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.30"/>` +
    `<stop offset="100%" stop-color="#7ec8e3" stop-opacity="0.04"/>` +
    `</linearGradient></defs>` +
    `<path d="${areaD}" fill="url(#${gid})"/>` +
    `<path d="${lineD}" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>` +
    `${dots}` +
    `</svg>`;
}

// ── Table renderer ───────────────────────────────────────────────────────────

function renderTable(days) {
  const tbody = document.getElementById("tbody");
  days.forEach(day => {
    const isToday = day.date === today;
    const tr = document.createElement("tr");
    if (isToday) tr.classList.add("today");

    // Day
    const tdDay = document.createElement("td");
    tdDay.textContent = day.label + (isToday ? " ◀ Today" : "");
    tr.appendChild(tdDay);

    // Up to 5 tide slots
    for (let i = 0; i < 5; i++) {
      const td = document.createElement("td");
      const tide = day.tides[i];
      if (tide) {
        td.innerHTML = `<span class="${tide.type === 'H' ? 'high' : 'low'}">${tide.type === 'H' ? '▲' : '▼'} ${tide.time}</span><br><span class="meta">${tide.height_m} m</span>`;
      } else {
        td.textContent = "—";
        td.style.color = "#2a4a6a";
      }
      tr.appendChild(td);
    }

    // Moon phase
    const tdMoon = document.createElement("td");
    if (day.moon_phase) {
      tdMoon.innerHTML = `<span class="moon-badge">${moonEmoji[day.moon_phase] || ""} ${day.moon_phase}</span>`;
    } else {
      tdMoon.textContent = "—";
      tdMoon.style.color = "#2a4a6a";
    }
    tr.appendChild(tdMoon);

    // Sun
    const tdSun = document.createElement("td");
    tdSun.innerHTML = `<span class="sun-row">↑ ${day.sunrise}<br>↓ ${day.sunset}</span>`;
    tr.appendChild(tdSun);

    // Moon times
    const tdMoonTime = document.createElement("td");
    tdMoonTime.innerHTML = `<span class="moon-row">↑ ${day.moonrise || "—"}<br>↓ ${day.moonset || "—"}</span>`;
    tr.appendChild(tdMoonTime);

    // Sparkline
    const tdSpark = document.createElement("td");
    tdSpark.className = "sparkline-cell";
    const uid = day.date.replace(/-/g, '');
    tdSpark.innerHTML = buildSparklineSVG(day.tides, uid);
    tr.appendChild(tdSpark);

    tbody.appendChild(tr);
  });
}

fetch('./data/tides.json')
  .then(r => r.json())
  .then(data => {
    document.querySelector('header p').textContent =
      `${data.days[0].label.split(' ').slice(2).join(' ')} – ${data.days[data.days.length-1].label} · All times ${data.timezone} · Heights in metres`;
    renderTable(data.days);
  })
  .catch(() => {
    document.getElementById("tbody").innerHTML =
      '<tr><td colspan="10" style="text-align:center;color:#f4a261;padding:2rem">Could not load data/tides.json — serve this folder with a local HTTP server.<br><code>python3 -m http.server 8080</code></td></tr>';
  });

</script>
</body>
</html>
