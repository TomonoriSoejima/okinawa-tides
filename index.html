<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatan Tides</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-title" content="Chatan Tides" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #08121f;
      color: #ddeeff;
      min-height: 100vh;
      padding: 1rem 0.75rem 2rem;
      transition: background 2s ease;
    }

    header {
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 1.5rem 1rem 1.25rem;
      border-radius: 18px;
      margin-bottom: 1.25rem;
      transition: background 2s ease;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    header p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.25rem;
    }

    /* card fade-in */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: cardIn 0.35s ease both;
    }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 0.75rem; }

    .card {
      background: #0e1f35;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #1a3050;
      animation: cardIn 0.35s ease both;
    }
    .card.today {
      border-color: #3a90d0;
      box-shadow: 0 0 0 2px #1a5a9055;
    }

    /* card header row */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem 0.5rem;
      background: #122840;
      border-bottom: 1px solid #1a3050;
    }
    .card-date {
      font-size: 1rem;
      font-weight: 700;
      color: #ddeeff;
    }
    .card.today .card-date { color: #7ec8e3; }
    .today-badge {
      font-size: 0.68rem;
      background: #1a5a90;
      color: #aadcf8;
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .card-head-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .share-btn {
      background: none;
      border: 1px solid #2a4a6a;
      color: #7ec8e3;
      border-radius: 8px;
      padding: 0.2rem 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      line-height: 1;
    }
    .share-btn:active { background: #1a3555; }
    .moon-phase {
      font-size: 0.75rem;
      background: #1c3555;
      color: #b8d4f0;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
    }

    /* sun / moon meta row */
    .card-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #1a3050;
    }
    .meta-box {
      padding: 0.45rem 0.3rem;
      text-align: center;
      border-right: 1px solid #1a3050;
    }
    .meta-box:last-child { border-right: none; }
    .meta-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .meta-box.sun  .meta-label { color: #e8c96a; }
    .meta-box.moon .meta-label { color: #b0c8f0; }
    .meta-value {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .meta-box.sun  .meta-value { color: #f0d97a; }
    .meta-box.moon .meta-value { color: #c8deff; }

    /* tides row */
    .card-tides {
      display: flex;
      flex-wrap: wrap;
      padding: 0.5rem 0.5rem;
      gap: 0.4rem;
    }
    .tide-chip {
      flex: 1 1 0;
      min-width: 60px;
      text-align: center;
      background: #0a1828;
      border-radius: 10px;
      padding: 0.45rem 0.3rem;
      border: 1px solid #1a3050;
    }
    .tide-chip.high { border-color: #2a6a8a; }
    .tide-chip.low  { border-color: #8a4a20; }
    .tide-type {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .tide-chip.high .tide-type { color: #7ec8e3; }
    .tide-chip.low  .tide-type { color: #f4a261; }
    .tide-time {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ddeeff;
    }
    .tide-height {
      font-size: 0.72rem;
      margin-top: 0.2rem;
    }
    .tide-chip.high .tide-height { color: #5ab0d0; }
    .tide-chip.low  .tide-height { color: #d4804a; }
    .tide-arrow {
      flex: 0 0 auto;
      font-size: 1rem;
      color: #334455;
      padding: 0 0.1rem;
      align-self: center;
      transition: color 0.3s, transform 0.3s;
    }
    .tide-arrow.active {
      color: #7ec8e3;
      transform: scale(1.4);
    }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #3a5a78;
    }
    footer a { color: #5a98c0; text-decoration: none; }

    /* sparkline */
    .card-sparkline {
      padding: 0.4rem 0.6rem 0.6rem;
      border-top: 1px solid #1a3050;
    }
    .card-sparkline svg { display: block; width: 100%; height: 44px; }

    /* weather strip */
    .card-weather {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      padding: 0.45rem 0.9rem;
      font-size: 0.78rem;
      background: #0c1e32;
      border-bottom: 1px solid #1a3050;
      color: #b8d4f0;
    }
    .wx-cond { font-weight: 600; color: #ddeeff; }
    .wx-temp { color: #f0d97a; }
    .wx-wind { color: #a8d8f0; }
    .wx-rain { color: #7ec8e3; }
    .wx-wave { color: #5ab0d0; }

    /* wider screens: 2-column card grid */
    @media (min-width: 640px) {
      .cards { flex-direction: row; flex-wrap: wrap; }
      .card  { flex: 1 1 calc(50% - 0.375rem); }
    }
    @media (min-width: 1024px) {
      .card { flex: 1 1 calc(33.33% - 0.5rem); }
    }
  </style>
</head>
<body>

<header>
  <h1>🌊 Chatan / Yomitan, Okinawa</h1>
  <p id="subtitle">Tide Calendar · JST · Heights in metres</p>
</header>

<div class="cards" id="cards"></div>

<footer>
  Data: <a href="https://www.tidetime.org/asia/japan/naha-okinawa-japan-calendar.htm" target="_blank" rel="noopener">tidetime.org</a> · © Tide Times 2026
</footer>

<script>
const moonEmoji = { "Full Moon": "🌕", "Last Quarter": "🌗", "New Moon": "🌑", "First Quarter": "🌓" };

const wmoEmoji = {
  0:"☀️", 1:"🌤", 2:"⛅", 3:"☁️",
  45:"🌫", 48:"🌫",
  51:"🌦", 53:"🌦", 55:"🌧", 56:"🌧", 57:"🌧",
  61:"🌧", 63:"🌧", 65:"🌧", 66:"🌧", 67:"🌧",
  71:"🌨", 73:"🌨", 75:"🌨", 77:"🌨",
  80:"🌦", 81:"🌦", 82:"🌦", 85:"🌨", 86:"🌨",
  95:"⛈", 96:"⛈", 99:"⛈"
};
const wmoLabel = {
  0:"Clear", 1:"Mostly clear", 2:"Partly cloudy", 3:"Overcast",
  45:"Fog", 48:"Fog",
  51:"Light drizzle", 53:"Drizzle", 55:"Heavy drizzle",
  56:"Drizzle", 57:"Heavy drizzle",
  61:"Light rain", 63:"Rain", 65:"Heavy rain",
  66:"Rain", 67:"Heavy rain",
  71:"Light snow", 73:"Snow", 75:"Heavy snow", 77:"Snow grains",
  80:"Showers", 81:"Showers", 82:"Heavy showers",
  85:"Snow showers", 86:"Heavy snow showers",
  95:"Thunderstorm", 96:"Thunderstorm", 99:"Thunderstorm"
};

function windArrow(deg) {
  if (deg == null) return "";
  return ["↓","↙","←","↖","↑","↗","→","↘"][Math.round(((deg + 180) % 360) / 45) % 8];
}

function fetchWeather() {
  const lat = 26.35, lon = 127.74; // Chatan/Yomitan coast
  const wxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant` +
    `&wind_speed_unit=ms` +
    `&timezone=Asia%2FTokyo&forecast_days=16`;
  const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}` +
    `&daily=wave_height_max&timezone=Asia%2FTokyo&forecast_days=7`;

  Promise.allSettled([fetch(wxUrl).then(r => r.json()), fetch(marineUrl).then(r => r.json())])
    .then(([wxRes, marineRes]) => {
      const wx = wxRes.status === 'fulfilled' ? wxRes.value : null;
      const marine = marineRes.status === 'fulfilled' ? marineRes.value : null;
      const byDate = {};
      if (wx && wx.daily) {
        wx.daily.time.forEach((date, i) => {
          byDate[date] = {
            code:     wx.daily.weather_code[i],
            tmax:     wx.daily.temperature_2m_max[i],
            tmin:     wx.daily.temperature_2m_min[i],
            rain:     wx.daily.precipitation_probability_max[i],
            wind:     wx.daily.wind_speed_10m_max[i],
            windDir:  wx.daily.wind_direction_10m_dominant[i],
          };
        });
      }
      if (marine && marine.daily) {
        marine.daily.time.forEach((date, i) => {
          if (byDate[date]) byDate[date].wave = marine.daily.wave_height_max[i];
        });
      }
      document.querySelectorAll('.card[data-date]').forEach(card => {
        const w = byDate[card.dataset.date];
        if (!w) return;
        const emoji = wmoEmoji[w.code] ?? "🌡";
        const label = wmoLabel[w.code] ?? "";
        const strip = document.createElement("div");
        strip.className = "card-weather";
        strip.innerHTML =
          `<span class="wx-cond">${emoji} ${label}</span>` +
          `<span class="wx-temp">🌡 ${Math.round(w.tmin)}–${Math.round(w.tmax)}°C</span>` +
          `<span class="wx-wind">💨 ${Math.round(w.wind)} m/s ${windArrow(w.windDir)}</span>` +
          (w.rain != null ? `<span class="wx-rain">🌧 ${w.rain}%</span>` : "") +
          (w.wave != null ? `<span class="wx-wave">🌊 ${w.wave.toFixed(1)} m</span>` : "");
        card.insertBefore(strip, card.children[1]);
      });
    });
}
const _d = new Date();
const today = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;

function t(val) { return val || "—"; }

// ── Sparkline (cosine interpolation, courtesy Copilot) ──
function parseTimeToMinutes(timeStr) {
  if (!timeStr) return null;
  const ampm = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (ampm) {
    let h = parseInt(ampm[1], 10);
    const min = parseInt(ampm[2], 10);
    if (ampm[3].toUpperCase() === 'PM' && h !== 12) h += 12;
    if (ampm[3].toUpperCase() === 'AM' && h === 12) h = 0;
    return h * 60 + min;
  }
  const h24 = timeStr.match(/^(\d{1,2}):(\d{2})$/);
  if (h24) return parseInt(h24[1], 10) * 60 + parseInt(h24[2], 10);
  return null;
}

function cosineInterp(a, b, mu) {
  return a + (b - a) * (1 - Math.cos(mu * Math.PI)) / 2;
}

function buildSparklineSVG(tides, uid) {
  const W = 400, H = 52, PAD = 4;
  if (!tides || tides.length < 2)
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"></svg>`;

  const pts = tides
    .map(t => ({ t: parseTimeToMinutes(t.time), h: t.height_m, type: t.type }))
    .filter(p => p.t !== null)
    .sort((a, b) => a.t - b.t);

  if (pts.length < 2)
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"></svg>`;

  const hs = pts.map(p => p.h);
  const hMin = Math.min(...hs), hMax = Math.max(...hs);
  const hPad = Math.max((hMax - hMin) * 0.2, 0.05);
  const lo = hMin - hPad, hi = hMax + hPad, hRng = hi - lo;

  const ext = [
    { t: pts[0].t - (pts[1].t - pts[0].t), h: pts[1].h },
    ...pts,
    { t: pts[pts.length-1].t + (pts[pts.length-1].t - pts[pts.length-2].t), h: pts[pts.length-2].h }
  ];

  const toX = t => PAD + (W - PAD*2) * (t / 1440);
  const toY = h => PAD + (H - PAD*2) * (1 - (h - lo) / hRng);

  const N = 120;
  const samples = [];
  for (let i = 0; i <= N; i++) {
    const tc = (i / N) * 1440;
    let s1 = ext[0], s2 = ext[ext.length-1];
    for (let j = 0; j < ext.length-1; j++) {
      if (ext[j].t <= tc && ext[j+1].t > tc) { s1 = ext[j]; s2 = ext[j+1]; break; }
    }
    const mu = s2.t === s1.t ? 0 : Math.max(0, Math.min(1, (tc - s1.t) / (s2.t - s1.t)));
    samples.push({ x: toX(tc), y: toY(cosineInterp(s1.h, s2.h, mu)) });
  }

  const lineD = samples.map((p,i) => `${i?'L':'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaD = `${lineD} L ${toX(1440).toFixed(1)} ${H} L ${toX(0).toFixed(1)} ${H} Z`;
  const dots = pts.map(p => {
    const color = p.type === 'H' ? '#7ec8e3' : '#f4a261';
    return `<circle cx="${toX(p.t).toFixed(1)}" cy="${toY(p.h).toFixed(1)}" r="3" fill="${color}" stroke="#08121f" stroke-width="1"/>`;
  }).join('');

  const gid = `sg${uid}`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">` +
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">` +
    `<stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.28"/>` +
    `<stop offset="100%" stop-color="#7ec8e3" stop-opacity="0.03"/>` +
    `</linearGradient></defs>` +
    `<path d="${areaD}" fill="url(#${gid})"/>` +
    `<path d="${lineD}" fill="none" stroke="#7ec8e3" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>` +
    `${dots}</svg>`;
}

function renderCards(days) {
  const container = document.getElementById("cards");
  days.forEach(day => {
    const isToday = day.date === today;
    const card = document.createElement("div");
    card.className = "card" + (isToday ? " today" : "");
    card.dataset.date = day.date;
    card.style.animationDelay = `${days.indexOf(day) * 40}ms`;

    // ── header ──
    const head = document.createElement("div");
    head.className = "card-head";
    const dateEl = document.createElement("div");
    dateEl.className = "card-date";
    dateEl.innerHTML = day.label + (isToday ? ' <span class="today-badge">Today</span>' : "");
    head.appendChild(dateEl);
    const headRight = document.createElement("div");
    headRight.className = "card-head-right";
    if (day.moon_phase) {
      const ph = document.createElement("span");
      ph.className = "moon-phase";
      ph.textContent = (moonEmoji[day.moon_phase] || "") + " " + day.moon_phase;
      headRight.appendChild(ph);
    }
    if (navigator.share) {
      const btn = document.createElement("button");
      btn.className = "share-btn";
      btn.textContent = "↗";
      btn.setAttribute("aria-label", "Share");
      btn.addEventListener("click", () => {
        const tideSummary = day.tides.map(ti =>
          `${ti.type === 'H' ? '▲' : '▼'} ${ti.time} ${Math.round(ti.height_m * 100)}cm`
        ).join('  ');
        navigator.share({
          title: `Chatan Tides – ${day.label}`,
          text: `🌊 ${day.label}\n${tideSummary}`,
          url: `${location.origin}${location.pathname}#${day.date}`
        }).catch(() => {});
      });
      headRight.appendChild(btn);
    }
    head.appendChild(headRight);
    card.appendChild(head);

    // ── sun / moon meta ──
    const meta = document.createElement("div");
    meta.className = "card-meta";
    const metaItems = [
      { cls: "sun",  label: "Sunrise",  value: t(day.sunrise) },
      { cls: "sun",  label: "Sunset",   value: t(day.sunset) },
      { cls: "moon", label: "Moonrise", value: t(day.moonrise) },
      { cls: "moon", label: "Moonset",  value: t(day.moonset) },
    ];
    metaItems.forEach(item => {
      const box = document.createElement("div");
      box.className = `meta-box ${item.cls}`;
      box.innerHTML = `<div class="meta-label">${item.label}</div><div class="meta-value">${item.value}</div>`;
      meta.appendChild(box);
    });
    card.appendChild(meta);

    // ── tides ──
    const tidesRow = document.createElement("div");
    tidesRow.className = "card-tides";
    const _now = new Date();
    const localToday = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
    const nowMins = day.date === localToday
      ? _now.getHours() * 60 + _now.getMinutes()
      : -1;
    const toMins = t => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
    day.tides.forEach((tide, i) => {
      const chip = document.createElement("div");
      chip.className = "tide-chip " + (tide.type === "H" ? "high" : "low");
      const heightCm = Math.round(tide.height_m * 100);
      chip.innerHTML = `
        <div class="tide-type">${tide.type === "H" ? "▲ High" : "▼ Low"}</div>
        <div class="tide-time">${tide.time}</div>
        <div class="tide-height">${heightCm} cm</div>`;
      tidesRow.appendChild(chip);
      if (i < day.tides.length - 1) {
        const next = day.tides[i + 1];
        const arrow = document.createElement("span");
        arrow.className = "tide-arrow";
        const beforeFirst = nowMins >= 0 && nowMins < toMins(day.tides[0].time) && i === 0;
        const inInterval  = nowMins >= toMins(tide.time) && nowMins < toMins(next.time);
        if (beforeFirst) {
          arrow.textContent = day.tides[0].type === "H" ? "▲" : "▼";
          arrow.classList.add("active");
        } else {
          arrow.textContent = next.type === "H" ? "▲" : "▼";
          if (inInterval) arrow.classList.add("active");
        }
        tidesRow.appendChild(arrow);
      }
    });
    card.appendChild(tidesRow);

    // ── sparkline ──
    const sparkRow = document.createElement("div");
    sparkRow.className = "card-sparkline";
    sparkRow.innerHTML = buildSparklineSVG(day.tides, day.date.replace(/-/g, ''));
    card.appendChild(sparkRow);

    container.appendChild(card);
  });
}

function applyTimeGradient() {
  const h = new Date().getHours();
  // Palette keyed by hour ranges
  let bg, hdr;
  if (h >= 5 && h < 7) {
    // Dawn
    bg  = 'linear-gradient(160deg, #0d1b2a 0%, #1a3a5c 100%)';
    hdr = 'linear-gradient(135deg, #1a3a5c 0%, #c47b3a 100%)';
  } else if (h >= 7 && h < 11) {
    // Morning
    bg  = 'linear-gradient(160deg, #08121f 0%, #0d2a4a 100%)';
    hdr = 'linear-gradient(135deg, #0d5fa0 0%, #5bbfea 100%)';
  } else if (h >= 11 && h < 15) {
    // Midday
    bg  = 'linear-gradient(160deg, #07101e 0%, #0a2540 100%)';
    hdr = 'linear-gradient(135deg, #0a7ec8 0%, #7ddcf8 100%)';
  } else if (h >= 15 && h < 17) {
    // Afternoon
    bg  = 'linear-gradient(160deg, #08121f 0%, #0c2038 100%)';
    hdr = 'linear-gradient(135deg, #0d5fa0 0%, #48b0e0 100%)';
  } else if (h >= 17 && h < 19) {
    // Sunset
    bg  = 'linear-gradient(160deg, #0c0e1a 0%, #2a1a2e 100%)';
    hdr = 'linear-gradient(135deg, #c4573a 0%, #e8904a 50%, #7a4a9a 100%)';
  } else if (h >= 19 && h < 21) {
    // Dusk
    bg  = 'linear-gradient(160deg, #090b14 0%, #1a1030 100%)';
    hdr = 'linear-gradient(135deg, #3a1a5a 0%, #6a3a8a 100%)';
  } else {
    // Night
    bg  = 'linear-gradient(160deg, #05080f 0%, #0a1020 100%)';
    hdr = 'linear-gradient(135deg, #0a0e1a 0%, #162240 100%)';
  }
  document.body.style.background = bg;
  document.querySelector('header').style.background = hdr;
}

applyTimeGradient();

fetch('./data/tides.json')
  .then(r => r.json())
  .then(data => {
    const first = data.days[0].label;
    const last  = data.days[data.days.length - 1].label;
    document.getElementById("subtitle").textContent =
      `${first} – ${last} · ${data.timezone} · Heights in cm`;
    renderCards(data.days);
    fetchWeather();
    // Scroll to hash date or today
    const hash = location.hash.replace('#', '');
    const target = hash
      ? document.querySelector(`[data-date="${hash}"]`)
      : document.querySelector('.card.today');
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  })
  .catch(() => {
    document.getElementById("cards").innerHTML =
      '<p style="text-align:center;color:#f4a261;padding:2rem">Could not load data/tides.json<br>Run: <code>python3 -m http.server 8081</code></p>';
  });
